# Render Blueprint — Laravel API
# Docs: https://render.com/docs/deploy-php-laravel

services:
  - type: web
    name: pms-laravel-api
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan migrate --force
      php artisan db:seed --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: pms-db
          property: connectionString
      - key: DJANGO_SERVICE_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: pms-db
    plan: free
    databaseName: pms_db
    user: pms_user
